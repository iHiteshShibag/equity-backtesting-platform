# Production edge server for the SPA build. Also reverse-proxies /api and
# the FastAPI docs to the `backend` service, so the browser only ever talks
# to one origin (this container) -- no CORS round-trip needed for same-origin
# deploys, and there's a single place to terminate TLS (see README for the
# certbot/Let's Encrypt steps to add a `listen 443 ssl` server block here).

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. A bare `proxy_pass http://backend:8000/...`
    # resolves at config-load time -- if the backend container isn't up yet
    # (first boot ordering, or later restarted/rescheduled), nginx refuses to
    # start at all with "host not found in upstream". Routing through a
    # variable forces per-request resolution instead, so nginx starts
    # regardless of backend's state and picks up IP changes without a reload.
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream http://backend:8000;

    # Same defensive headers app/core/security_headers.py adds to API
    # responses -- nginx serves the static bundle directly, so the backend
    # middleware never sees these requests.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Hashed filenames (Vite's default) make long-lived caching safe; a new
    # build ships under a new filename rather than mutating this one.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any path not matched above (client-side routes) serves
    # index.html so the router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass $backend_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass $backend_upstream/docs;
    }

    location /redoc {
        proxy_pass $backend_upstream/redoc;
    }

    location /openapi.json {
        proxy_pass $backend_upstream/openapi.json;
    }

    # Scrape target for an internal Prometheus, not for public consumption --
    # block it at the edge rather than relying on the backend alone.
    location /metrics {
        deny all;
        return 403;
    }
}
