name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    # Login/refresh are Redis-backed rate limits (app/core/rate_limit.py) so the
    # limit is shared across replicas in production -- the auth integration
    # tests exercise that real endpoint and need a real Redis to talk to.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/0
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Lint (ruff)
        run: ruff check app

      - name: Type check (mypy)
        # Several dozen pre-existing errors, mostly Column[T]-vs-T mismatches
        # from declarative Column() attributes (SQLAlchemy's legacy mapping
        # style, used throughout app/modules/*/models.py, doesn't give mypy
        # enough info to know an instance attribute is really a plain T).
        # Fixing that means migrating every model to SQLAlchemy 2.0's
        # Mapped[] annotations, which is real work on its own and out of
        # scope here. continue-on-error keeps this from blocking merges on
        # that pre-existing debt while still surfacing new/regressed errors
        # in the job output for review.
        run: mypy app
        continue-on-error: true

      - name: Test (pytest)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    # Catches Dockerfile/build-context breakage (e.g. a dependency that
    # resolves locally but not in a clean image, a bad COPY path) before it
    # reaches a deploy -- no registry configured yet, so this builds and
    # discards the images rather than pushing anywhere.
    steps:
      - uses: actions/checkout@v4

      - name: Build backend prod image
        run: docker build -f backend/Dockerfile.prod backend

      - name: Build frontend prod image
        run: docker build -f frontend/Dockerfile.prod frontend
