services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: backtesting_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Connection pooler in front of Postgres: lets backend/celery-worker be
  # scaled to many replicas (`docker-compose up --scale celery-worker-backtest=3`)
  # without each replica's own SQLAlchemy pool multiplying real Postgres
  # connections past its ~100-connection ceiling. Migrations/seeding talk to
  # `db` directly since they're one-shot and want a plain, unpooled session.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/backtesting_db
      # Postgres 15 requires scram-sha-256 (see its pg_hba.conf) -- md5 (pgbouncer's
      # own default) fails backend auth against it with "wrong password type".
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/backtesting_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: alembic upgrade head

  seed-admin:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/backtesting_db
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: python scripts/seed_admin.py

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:5432/backtesting_db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in the root .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed-admin:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # Backtests are the latency-sensitive, user-facing path -- their own queue
  # and worker so an in-progress ingestion run never delays them. Scale with
  # `docker-compose up --scale celery-worker-backtest=N`.
  celery-worker-backtest:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:5432/backtesting_db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in the root .env}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: celery -A app.worker.celery_app worker --loglevel=info --queues=backtest --concurrency=4 --hostname=backtest@%h

  # Ingestion is slow (network-bound scraping across ~100 tickers) and only
  # runs on a schedule or manual trigger -- a small, separately-scaled pool so
  # it doesn't compete with backtest workers for the same process slots.
  celery-worker-ingestion:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:5432/backtesting_db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in the root .env}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: celery -A app.worker.celery_app worker --loglevel=info --queues=ingestion --concurrency=2 --hostname=ingestion@%h

  celery-beat:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:5432/backtesting_db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in the root .env}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: celery -A app.worker.celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    environment:
      VITE_SENTRY_DSN: ${SENTRY_DSN_FRONTEND:-}
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
